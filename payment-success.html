<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - Nita Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Poppins', sans-serif; }
        h1,h2,h3,h4,h5,h6 { font-family: 'Playfair Display', serif; }
        
        body {
            background: linear-gradient(135deg, #F9F5F0 0%, #E8D5D0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 20px 60px rgba(196, 125, 143, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .success-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 15px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-content {
            padding: 40px 30px;
        }

        .detail-box {
            background: #F9F5F0;
            border-left: 4px solid #C47D8F;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .detail-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .detail-value.highlight {
            color: #C47D8F;
            font-size: 24px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-action {
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
        }

        .btn-whatsapp:hover {
            background: #1ea953;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-home {
            background: #C47D8F;
            color: white;
            border: none;
        }

        .btn-home:hover {
            background: #a86577;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 125, 143, 0.3);
        }

        .info-box {
            background: #E8F5E9;
            border: 1px solid #81C784;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #2E7D32;
        }

        .info-box i {
            color: #4CAF50;
            margin-right: 8px;
        }

        .divider {
            height: 1px;
            background: #E8D5D0;
            margin: 20px 0;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .spinner-border {
            color: #C47D8F;
        }
    </style>
</head>
<body>

<div class="success-card" id="successCard">
    <!-- Loading State -->
    <div class="loading" id="loadingState">
        <div class="spinner-border mb-3" role="status" style="width: 50px; height: 50px;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted">Memproses data pembayaran...</p>
    </div>
</div>

<!-- Inline Script untuk Setup Awal (tidak perlu file external) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'http://localhost:8000/api';
    const WHATSAPP_NUMBER = '6287781232445';

    document.addEventListener('DOMContentLoaded', async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get('transaction');
        const bookingId = urlParams.get('booking');

        if (!transactionId || !bookingId) {
            showError('Data pembayaran tidak ditemukan.');
            return;
        }

        try {
            // Ambil detail dari API atau localStorage
            let bookingData = null;

            // Coba API dulu
            try {
                const apiRes = await apiCall(`/bookings/${bookingId}`);
                if (apiRes?.data) bookingData = apiRes.data;
            } catch (e) {
                console.warn('API tidak tersedia');
            }

            // Fallback ke localStorage
            if (!bookingData) {
                const allBookings = JSON.parse(localStorage.getItem('offlineBookings') || '[]');
                bookingData = allBookings.find(b => b.booking_id === bookingId);
            }

            if (!bookingData) {
                showError('Data booking tidak ditemukan. Silakan hubungi admin.');
                return;
            }

            renderSuccess(bookingData, transactionId);

        } catch (error) {
            console.error('Error:', error);
            showError('Terjadi kesalahan. Silakan refresh halaman.');
        }
    });

    function renderSuccess(booking, transactionId) {
        const dateFormatted = new Date(booking.date).toLocaleDateString('id-ID', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        const servicesHtml = (booking.services || []).map(s => `
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span>${s.name}</span>
                <strong style="color: #C47D8F;">Rp ${Number(s.price).toLocaleString('id-ID')}</strong>
            </div>
        `).join('');

        const whatsappMessage = encodeURIComponent(
            `Halo Nita Salon!\n\nPembayaran saya sudah berhasil.\n\nDetail:\n📋 ID Transaksi: ${transactionId}\n👤 Nama: ${booking.customer_name}\n📅 Tanggal: ${dateFormatted}\n🕐 Jam: ${booking.time}\n💰 Total: Rp ${Number(booking.total_price).toLocaleString('id-ID')}\n\nTerima kasih!`
        );

        const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${whatsappMessage}`;

        document.getElementById('successCard').innerHTML = `
            <div class="success-header">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 style="margin: 0;">Pembayaran Berhasil!</h2>
                <p style="margin: 10px 0 0 0; opacity: 0.95;">Terima kasih telah memesan layanan kami</p>
            </div>

            <div class="success-content">
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-receipt"></i> ID Transaksi</div>
                    <div class="detail-value highlight">${transactionId}</div>
                </div>

                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-user"></i> Nama Pelanggan</div>
                    <div class="detail-value">${booking.customer_name}</div>
                </div>

                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-calendar"></i> Tanggal & Jam</div>
                    <div class="detail-value">${dateFormatted} - ${booking.time}</div>
                </div>

                <div class="divider"></div>

                <h6 style="color: #C47D8F; margin-bottom: 12px;">
                    <i class="fas fa-list"></i> Layanan yang Dipesan
                </h6>
                <div style="background: #F9F5F0; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px;">
                    ${servicesHtml}
                </div>

                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-hourglass-end"></i> Total Durasi</div>
                    <div class="detail-value">${booking.total_duration} menit</div>
                </div>

                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-tag"></i> Total Pembayaran</div>
                    <div class="detail-value highlight">Rp ${Number(booking.total_price).toLocaleString('id-ID')}</div>
                </div>

                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    <strong>Booking Anda telah dikonfirmasi.</strong> Kami akan mengirimkan reminder via WhatsApp 1 hari sebelum jadwal.
                </div>

                <div class="action-buttons">
                    <a href="${whatsappUrl}" target="_blank" rel="noopener noreferrer" class="btn-action btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> Kirim Notifikasi WhatsApp
                    </a>
                    <a href="index.html" class="btn-action btn-home">
                        <i class="fas fa-home"></i> Kembali ke Home
                    </a>
                </div>
            </div>
        `;

        document.getElementById('loadingState').style.display = 'none';
    }

    function showError(message) {
        document.getElementById('successCard').innerHTML = `
            <div style="padding: 40px 30px; text-align: center;">
                <div style="font-size: 60px; color: #DC3545; margin-bottom: 20px;">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <h3 style="color: #C47D8F; margin-bottom: 10px;">Terjadi Kesalahan</h3>
                <p style="color: #666; margin-bottom: 30px;">${message}</p>
                <a href="booking.html" class="btn btn-lg" style="background: #C47D8F; color: white; border: none; border-radius: 10px;">
                    <i class="fas fa-arrow-left"></i> Kembali ke Booking
                </a>
            </div>
        `;
    }

    async function apiCall(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
        const token = localStorage.getItem('authToken');
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const response = await fetch(`${API_URL}${endpoint}`, { headers, ...options });
        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        return response.json();
    }
</script>

</body>
</html>
